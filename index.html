<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Anniversary</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #fff0f5; color: #ff4d6d; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .phone-container { width: 100vw; height: 100vh; max-width: 450px; position: relative; background: #ffffff; box-shadow: 0 0 20px rgba(255, 77, 109, 0.1); overflow: hidden; display: flex; flex-direction: column; }
        .page { display: none; width: 100%; height: 100%; padding: 30px 24px; flex-direction: column; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; animation: fadeIn 0.5s ease-in-out; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        img { max-width: 100%; border-radius: 16px; border: 3px solid #fff; }
        button.next-btn { background-color: #ff758f; color: white; border: none; padding: 14px 28px; font-size: 1.1rem; font-weight: 600; border-radius: 30px; cursor: pointer; margin-top: 30px; box-shadow: 0 4px 10px rgba(255, 117, 143, 0.3); }
        
        /* Modal Styles */
        #gift-modal { display: none; opacity: 0; transition: opacity 0.3s ease-in-out; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #gift-modal.active { display: flex; opacity: 1; }

        /* Page 3: Lock View (ไม่ให้เลื่อน) */
        #page3 { overflow: hidden; justify-content: center; }
        #page3 img { max-height: 70vh; object-fit: contain; }

        /* Other Pages */
        #page0 { background-image: url('photo1.jpg'); background-size: cover; background-position: center; justify-content: flex-end; padding-bottom: 60px; }
        #page1 { background-image: url('photo1.jpg'); background-size: cover; justify-content: space-between; padding-top: 60px; }
        .dots-container { display: flex; gap: 15px; justify-content: center; background-color: #ffffff; padding: 12px 25px; border-radius: 20px; box-shadow: 0 4px 10px rgba(255, 77, 109, 0.15); }
        .dot { width: 12px; height: 12px; border: 2px solid #ffccd5; border-radius: 50%; }
        .dot.filled { background-color: #ff758f; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 270px; margin-bottom: 40px; }
        .key { aspect-ratio: 1/1; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #ffccd5; color: #ff4d6d; font-weight: bold; }
    </style>
</head>
<body>
    <audio id="bgMusic" loop><source src="song.mp3" type="audio/mpeg"></audio>
    <div class="phone-container">
        <!-- Page 0-2 -->
        <div id="page0" class="page active"><button class="next-btn" onclick="startJourney()">Let's start the journey ❤️</button></div>
        <div id="page1" class="page">
            <div class="dots-container" id="dotsContainer"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <div class="keypad"><div class="key" onclick="pressKey('1')">1</div><div class="key" onclick="pressKey('2')">2</div><div class="key" onclick="pressKey('3')">3</div><div class="key" onclick="pressKey('4')">4</div><div class="key" onclick="pressKey('5')">5</div><div class="key" onclick="pressKey('6')">6</div><div class="key" onclick="pressKey('7')">7</div><div class="key" onclick="pressKey('8')">8</div><div class="key" onclick="pressKey('9')">9</div><div></div><div class="key" onclick="pressKey('0')">0</div><div class="key" onclick="clearLast()">&larr;</div></div>
        </div>
        <div id="page2" class="page">
            <h1 style="color:#ff758f; margin-bottom:20px;">6th Anniversary</h1>
            <img src="photo2.jpg" style="width:200px; height:200px;">
            <button class="next-btn" onclick="navigateTo('page3')">Click to read my letter</button>
        </div>
        <!-- Page 3: Locked -->
        <div id="page3" class="page">
            <img src="photo3.png">
            <button class="next-btn" onclick="navigateTo('page4')">Next Page ❤️</button>
        </div>
        <!-- Page 4-6 -->
        <div id="page4" class="page" style="background-color: #fff0f5;">
            <div id="cake-area" style="width:100%; height:80%;" onclick="placeCandle(event)"></div>
            <button id="blow-btn" class="next-btn" onclick="navigateTo('page5')" style="display:none;">Blow the Candles 🎂</button>
        </div>
        <div id="page5" class="page">
            <div style="display:flex; flex-direction:column; gap:20px;">
                <div onclick="openGift('cakedu.png', '', 0)"><img src="gift1.png" style="width:100px;"></div>
                <div onclick="openGift('flower.png', '', 1)"><img src="gift2.png" style="width:100px;"></div>
                <div onclick="openGift('dinner', 'Dinner at Sancreed well cafe', 2)"><img src="gift3.png" style="width:100px;"></div>
            </div>
            <button id="memories-btn" class="next-btn" onclick="navigateTo('page6')" style="display:none;">Click to see our memories</button>
            <div id="gift-modal">
                <img id="modal-img" src="">
                <p id="modal-text" style="font-size:1.5rem; color:#ff758f;"></p>
                <button onclick="closeModal()" class="next-btn">Close</button>
            </div>
        </div>
        <div id="page6" class="page">
            <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;">
                <img src="photo1.jpg"><img src="photo2.jpg"><img src="photo3.jpg"><img src="photo4.jpg">
                <img src="photo5.jpg"><img src="photo6.jpg"><img src="photo7.jpg"><img src="photo8.jpg">
                <img src="photo9.jpg"><img src="photo10.jpg"><img src="photo11.jpg"><img src="photo12.jpg">
            </div>
        </div>
    </div>
    <script>
        let openedGifts = [false, false, false];
        let currentInput = "";
        function startJourney() { document.getElementById('bgMusic').play(); navigateTo('page1'); }
        function navigateTo(p) { document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active')); document.getElementById(p).classList.add('active'); }
        function pressKey(n) { if(currentInput.length < 6) { currentInput += n; updateDots(); if(currentInput.length === 6 && currentInput === "270725") navigateTo('page2'); } }
        function clearLast() { currentInput = currentInput.slice(0,-1); updateDots(); }
        function updateDots() { document.querySelectorAll('.dot').forEach((d,i) => i < currentInput.length ? d.classList.add('filled') : d.classList.remove('filled')); }
        function placeCandle() { document.getElementById('blow-btn').style.display = 'block'; }
        function openGift(src, text, index) {
            openedGifts[index] = true;
            const modal = document.getElementById('gift-modal');
            modal.classList.add('active');
            if(src === 'dinner') { document.getElementById('modal-img').style.display='none'; document.getElementById('modal-text').innerText = text; }
            else { document.getElementById('modal-img').src = src; document.getElementById('modal-text').innerText = ""; }
            if(openedGifts.every(v => v === true)) document.getElementById('memories-btn').style.display = 'block';
        }
        function closeModal() { document.getElementById('gift-modal').classList.remove('active'); }
    </script>
</body>
</html>
