<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Anniversary</title>
    <!-- นำเข้าฟอนต์อ้วนกลมน่ารัก -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #fff0f5; 
            color: #ff4d6d; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .phone-container {
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            position: relative;
            background: #ffffff; 
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .page {
            display: none;
            width: 100%;
            min-height: 100%;
            padding: 30px 24px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease-in-out;
        }

        .page.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        img {
            max-width: 100%;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.1);
            border: 3px solid #fff;
        }

        button.next-btn {
            background-color: #ff758f; 
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 4px 10px rgba(255, 117, 143, 0.3);
            transition: transform 0.2s;
        }

        button.next-btn:active {
            transform: scale(0.95);
        }

        /* PAGE 0 & 1 */
        #page0 {
            background-image: url('photo1.jpg');
            background-size: cover;
            background-position: center top;
            justify-content: flex-end; 
            padding: 60px 24px;
        }

        #page1 {
            justify-content: space-between;
            padding: 60px 24px 20px 24px;
            background-image: url('photo1.jpg');
            background-size: cover;
            background-position: center top;
        }

        .passcode-header h2 { font-size: 1.6rem; color: #ffffff; margin-bottom: 15px; text-shadow: 0 2px 8px rgba(255, 77, 109, 0.6); }

        .dots-container { display: flex; gap: 15px; justify-content: center; background-color: #ffffff; padding: 12px 25px; border-radius: 20px; }
        .dot { width: 12px; height: 12px; border: 2px solid #ffccd5; border-radius: 50%; }
        .dot.filled { background-color: #ff758f; border-color: #ff758f; }

        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 270px; margin: auto; }
        .key { aspect-ratio: 1/1; border-radius: 50%; background: #ffffff; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: #ff4d6d; cursor: pointer; border: 1px solid #ffccd5; }

        /* PAGE 2 */
        #page2 { justify-content: center; background-color: #ffffff; }
        .horizontal-counter { font-weight: 700; font-size: 2.5rem; display: flex; justify-content: center; gap: 4px; color: #ff758f; }
        .labels-row { display: flex; justify-content: center; gap: 32px; font-size: 0.8rem; font-weight: 600; color: #ffa6c9; }

        /* PAGE 3 */
        #page3 { justify-content: flex-start; padding: 0; }
        .scrollable-letter-wrapper img { width: 100%; border-radius: 0; border: none; box-shadow: none; }
        .letter-footer { padding: 20px 24px 40px 24px; display: flex; justify-content: center; }

        /* PAGE 4 */
        #page4 { background-color: #fff0f5; text-align: center; justify-content: center; }
        .cake-interactive-container { position: relative; width: 85%; max-width: 320px; margin: 20px auto; cursor: pointer; }
        .cake-bg-img { width: 100%; display: block; }
        .placed-candle { position: absolute; width: 24px; transform: translate(-50%, -100%); pointer-events: none; animation: dropCandle 0.2s ease-out; }
        @keyframes dropCandle { from { transform: translate(-50%, -150%) scale(1.2); opacity: 0; } to { transform: translate(-50%, -100%) scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="phone-container">

        <!-- PAGE 0 -->
        <div id="page0" class="page active">
            <button class="next-btn" onclick="navigateTo('page1')">Let's start the journey ❤️</button>
        </div>

        <!-- PAGE 1 -->
        <div id="page1" class="page">
            <div class="passcode-header">
                <h2>Enter the Passcode</h2>
                <div class="dots-container" id="dotsContainer">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            </div>
            <div class="keypad">
                <div class="key" onclick="pressKey('1')">1</div><div class="key" onclick="pressKey('2')">2</div><div class="key" onclick="pressKey('3')">3</div>
                <div class="key" onclick="pressKey('4')">4</div><div class="key" onclick="pressKey('5')">5</div><div class="key" onclick="pressKey('6')">6</div>
                <div class="key" onclick="pressKey('7')">7</div><div class="key" onclick="pressKey('8')">8</div><div class="key" onclick="pressKey('9')">9</div>
                <div></div><div class="key" onclick="pressKey('0')">0</div><div class="key" onclick="clearLast()">&larr;</div>
            </div>
        </div>

        <!-- PAGE 2 -->
        <div id="page2" class="page">
            <h1 id="counter-title">Countdown to our 1st Anniversary</h1>
            <div class="horizontal-counter">
                <span id="days-box">00</span>:<span id="hours-box">00</span>:<span id="minutes-box">00</span>:<span id="seconds-box">00</span>
            </div>
            <div class="labels-row"><span>days</span><span>hours</span><span>mins</span><span>secs</span></div>
            <button class="next-btn" onclick="goToLetter()">Click to read my letter</button>
        </div>

        <!-- PAGE 3 -->
        <div id="page3" class="page">
            <div class="scrollable-letter-wrapper">
                <img src="photo3.png" alt="My Letter to You">
                <div class="letter-footer">
                    <button class="next-btn" onclick="goToCakePage()">Click to enter the birthday surprise 🎉</button>
                </div>
            </div>
        </div>

        <!-- PAGE 4 -->
        <div id="page4" class="page">
            <h1>Make a Wish ✨</h1>
            <p>Tap on the cake to place candles!</p>
            <div class="cake-interactive-container" id="cakeContainer" onclick="placeCandle(event)">
                <img src="cake.png" class="cake-bg-img" alt="Cake">
            </div>
            <button class="next-btn" onclick="finishBlowing()">Blow the Candles 🎂</button>
        </div>
    </div>

    <script>
        const CORRECT_PASSCODE = "270725";
        const TARGET_DATE = new Date("2026-07-27T00:00:00").getTime(); 

        let currentInput = "";
        function pressKey(num) {
            if (currentInput.length < 6) {
                currentInput += num;
                updateDots();
                if (currentInput.length === 6) setTimeout(checkPasscode, 200);
            }
        }
        function clearLast() { currentInput = currentInput.slice(0, -1); updateDots(); }
        function updateDots() {
            document.querySelectorAll('.dot').forEach((dot, i) => dot.className = i < currentInput.length ? 'dot filled' : 'dot');
        }
        function checkPasscode() {
            if (currentInput === CORRECT_PASSCODE) { navigateTo('page2'); startCountdown(); }
            else { currentInput = ""; updateDots(); alert("Wrong passcode!"); }
        }
        function navigateTo(p) { document.querySelectorAll('.page').forEach(page => page.classList.remove('active')); document.getElementById(p).classList.add('active'); }
        
        function startCountdown() {
            setInterval(() => {
                const diff = TARGET_DATE - new Date().getTime();
                document.getElementById('days-box').innerText = Math.floor(diff / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
                document.getElementById('hours-box').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
                document.getElementById('minutes-box').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
                document.getElementById('seconds-box').innerText = Math.floor((diff % (1000 * 60)) / 1000).toString().padStart(2, '0');
            }, 1000);
        }

        function goToLetter() { navigateTo('page3'); }
        function goToCakePage() { navigateTo('page4'); }

        function placeCandle(e) {
            const cont = document.getElementById('cakeContainer');
            const rect = cont.getBoundingClientRect();
            const candle = document.createElement('img');
            candle.src = 'candle.png';
            candle.className = 'placed-candle';
            candle.style.left = `${((e.clientX - rect.left) / rect.width) * 100}%`;
            candle.style.top = `${((e.clientY - rect.top) / rect.height) * 100}%`;
            cont.appendChild(candle);
        }

        function finishBlowing() {
            const candles = document.querySelectorAll('.placed-candle');
            if (candles.length === 0) return alert("Place some candles first!");
            candles.forEach(c => c.src = 'candle-off.png');
            setTimeout(() => alert("Happy Anniversary! 🎂"), 300);
        }
    </script>
</body>
</html>
