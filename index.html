<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Anniversary</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #fff0f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .phone-container { width: 100vw; height: 100vh; max-width: 450px; background: #ffffff; position: relative; overflow-y: auto; }
        .page { display: none; width: 100%; min-height: 100%; flex-direction: column; align-items: center; padding: 20px; }
        .page.active { display: flex; }

        /* หน้าที่ 2 ปรับให้รูปแสดงขนาดใหญ่ตามที่คุณต้องการ */
        #page2 { justify-content: flex-start; padding-top: 40px; }
        .img-wrapper-p2 { width: 100%; max-width: 400px; margin-bottom: 25px; }
        .img-wrapper-p2 img { width: 100%; height: auto; border-radius: 20px; display: block; }

        /* ส่วนนับถอยหลัง */
        .horizontal-counter { font-weight: 700; font-size: 2.5rem; display: flex; justify-content: center; gap: 4px; color: #ff758f; margin-bottom: 5px; }
        .labels-row { display: flex; justify-content: center; gap: 32px; font-size: 0.8rem; font-weight: 600; color: #ffa6c9; margin-bottom: 30px; }

        /* ปุ่ม */
        button.next-btn { background-color: #ff758f; color: white; border: none; padding: 15px 40px; font-size: 1.1rem; font-weight: 600; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(255, 117, 143, 0.3); }
        
        /* สไตล์อื่นๆ สำหรับหน้าอื่น */
        #page0, #page1 { justify-content: center; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 270px; margin-top: 20px; }
        .key { aspect-ratio: 1/1; border-radius: 50%; background-color: #ffe4e8; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- PAGE 0 -->
        <div id="page0" class="page active">
            <button class="next-btn" onclick="navigateTo('page1')">Let's start the journey ❤️</button>
        </div>

        <!-- PAGE 1 -->
        <div id="page1" class="page">
            <h2>Enter the Passcode</h2>
            <div class="keypad">
                <div class="key" onclick="pressKey('1')">1</div><div class="key" onclick="pressKey('2')">2</div><div class="key" onclick="pressKey('3')">3</div>
                <div class="key" onclick="pressKey('4')">4</div><div class="key" onclick="pressKey('5')">5</div><div class="key" onclick="pressKey('6')">6</div>
                <div class="key" onclick="pressKey('7')">7</div><div class="key" onclick="pressKey('8')">8</div><div class="key" onclick="pressKey('9')">9</div>
                <div></div><div class="key" onclick="pressKey('0')">0</div><div class="key" onclick="clearLast()">&larr;</div>
            </div>
        </div>

        <!-- PAGE 2: ปรับสัดส่วนใหม่ -->
        <div id="page2" class="page">
            <div class="img-wrapper-p2">
                <img src="photo2.jpg" alt="Our Memory">
            </div>
            <div class="horizontal-counter">
                <span id="days-box">00</span>:<span id="hours-box">00</span>:<span id="minutes-box">00</span>:<span id="seconds-box">00</span>
            </div>
            <div class="labels-row">
                <span>days</span><span>hours</span><span>mins</span><span>secs</span>
            </div>
            <button class="next-btn" onclick="navigateTo('page3')">Click to read my letter</button>
        </div>

        <!-- PAGE 3 & 4 (คงเดิม) -->
        <div id="page3" class="page"><h1>Letter Content</h1><button onclick="navigateTo('page4')">Next</button></div>
        <div id="page4" class="page"><h1>Happy Anniversary!</h1></div>
    </div>

    <script>
        const CORRECT_PASSCODE = "270725";
        const TARGET_DATE = new Date("2026-07-27T00:00:00").getTime();

        function pressKey(num) { /* Logic เดิม */ }
        function navigateTo(id) { document.querySelectorAll('.page').forEach(p=>p.classList.remove('active')); document.getElementById(id).classList.add('active'); if(id==='page2') startCountdown(); }
        
        function startCountdown() {
            setInterval(() => {
                const diff = TARGET_DATE - new Date().getTime();
                document.getElementById('days-box').innerText = String(Math.floor(diff / (1000*60*60*24))).padStart(2,'0');
                document.getElementById('hours-box').innerText = String(Math.floor((diff % (1000*60*60*24)) / (1000*60*60))).padStart(2,'0');
                document.getElementById('minutes-box').innerText = String(Math.floor((diff % (1000*60*60)) / (1000*60))).padStart(2,'0');
                document.getElementById('seconds-box').innerText = String(Math.floor((diff % (1000*60)) / 1000)).padStart(2,'0');
            }, 1000);
        }
    </script>
</body>
</html>
