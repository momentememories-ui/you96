<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Anniversary</title>
    <!-- นำเข้าฟอนต์อ้วนกลมน่ารักสำหรับหน้านับเวลา -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #fff0f5; 
            color: #ff4d6d; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Container for Mobile view */
        .phone-container {
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            position: relative;
            background: #ffffff; 
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .page {
            display: none;
            width: 100%;
            min-height: 100%;
            padding: 30px 24px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease-in-out;
        }

        .page.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        img {
            max-width: 100%;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.1);
            border: 3px solid #fff;
        }

        button.next-btn {
            background-color: #ff758f; 
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 4px 10px rgba(255, 117, 143, 0.3);
            transition: transform 0.2s;
        }

        button.next-btn:active {
            transform: scale(0.95);
        }

        /* PAGE 0: Welcome Gate using photo1.jpg */
        #page0 {
            background-image: url('photo1.jpg');
            background-size: cover;
            background-position: center top;
            position: relative;
            justify-content: flex-end; 
            padding: 60px 24px 60px 24px;
        }

        #page0::before, #page1::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 240, 245, 0.15);
            z-index: 1;
        }

        .welcome-action {
            position: relative;
            z-index: 2;
            width: 100%;
            text-align: center;
        }

        /* PAGE 1: Passcode Lock */
        #page1 {
            justify-content: space-between;
            padding: 60px 24px 20px 24px;
            background-image: url('photo1.jpg');
            background-size: cover;
            background-position: center top;
            position: relative;
        }

        .passcode-header, .keypad {
            position: relative;
            z-index: 2;
        }

        .passcode-header {
            text-align: center;
            width: 100%;
        }

        .passcode-header h2 {
            font-size: 1.6rem;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(255, 77, 109, 0.6);
        }

        .dots-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 5px;
            background-color: #ffffff; 
            padding: 12px 25px;
            border-radius: 20px;
            display: inline-flex;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.15);
        }

        .dot {
            width: 12px;
            height: 12px;
            border: 2px solid #ffccd5;
            border-radius: 50%;
            transition: background 0.1s;
        }

        .dot.filled {
            background-color: #ff758f; 
            border-color: #ff758f;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 270px;
            margin-top: auto; 
            margin-bottom: 15px;
        }

        .key {
            aspect-ratio: 1/1;
            border-radius: 50%;
            background-color: #ffffff; 
            font-size: 1.4rem;
            color: #ff4d6d; 
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 8px rgba(255, 77, 109, 0.15);
            transition: background 0.1s, transform 0.1s;
            border: 1px solid #ffccd5;
        }

        .key:active {
            background-color: #fff0f5;
            transform: scale(0.95);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }

        /* NEW PAGE 2: Counter ปรับปรุงตามรูปเรฟ */
        #page2 {
            justify-content: flex-start;
            background-color: #ffffff;
            padding-top: 20px;
            padding-bottom: 30px;
        }

        #page2 h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.4rem;
            color: #ff758f;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .img-wrapper-p2 {
            width: 85%;
            max-height: 200px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }

        .img-wrapper-p2 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }

        /* สไตล์ชุดตัวเลขและตัวหนังสือแบบอ้วนกลมน่ารักตามเรฟ */
        .cute-counter-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            margin-top: 5px;
        }

        .counter-row {
            text-align: center;
            width: 100%;
        }

        .cute-num {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 2.6rem;
            line-height: 1;
            display: block;
            letter-spacing: 1px;
            /* เพิ่มขอบและเงาจางๆ ให้ตัวเลขเด้งหนาน่ารัก */
            text-shadow: 1px 1px 0px #fff, -1px -1px 0px #fff, 1px -1px 0px #fff, -1px 1px 0px #fff, 0px 4px 8px rgba(0,0,0,0.06);
        }

        .cute-label {
            font-family: 'Fredoka', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 2px;
            display: block;
        }

        /* ไล่สีสันพาสเทลตามหน่วยใหญ่ลงไปเล็ก */
        .color-years { color: #ff85a2; }
        .label-years { color: #ffa6c9; }

        .color-months { color: #ffb3c6; }
        .label-months { color: #ffccd5; }

        .color-days { color: #fbc4ab; }
        .label-days { color: #fcd5ce; }

        .color-hours { color: #b7e4c7; }
        .label-hours { color: #d8f3dc; }

        .color-minutes { color: #c0b9dd; }
        .label-minutes { color: #d6d2ed; }

        .color-seconds { color: #a8dadc; }
        .label-seconds { color: #e1f5fe; }

        /* PAGE 3: Letter */
        #page3 {
            justify-content: flex-start;
            padding-top: 40px;
            padding-bottom: 40px;
            background-color: #fff0f5;
        }

        .letter-paper {
            background: #ffffff; 
            width: 100%;
            padding: 25px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.1);
            border: 1px solid #ffccd5;
            line-height: 1.6;
            font-size: 1rem;
            color: #4a4a4a;
            white-space: pre-line;
            text-align: left;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 15px;
            background-color: #ff4d6d;
            animation: blink 0.7s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="phone-container">

        <!-- PAGE 0: WELCOME GATE -->
        <div id="page0" class="page active">
            <div class="welcome-action">
                <button class="next-btn" onclick="navigateTo('page1')">Let's start the journey ❤️</button>
            </div>
        </div>

        <!-- PAGE 1: PASSCODE -->
        <div id="page1" class="page">
            <div class="passcode-header">
                <h2>Enter the Passcode</h2>
                <div class="dots-container" id="dotsContainer">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>

            <div class="keypad">
                <div class="key" onclick="pressKey('1')">1</div>
                <div class="key" onclick="pressKey('2')">2</div>
                <div class="key" onclick="pressKey('3')">3</div>
                <div class="key" onclick="pressKey('4')">4</div>
                <div class="key" onclick="pressKey('5')">5</div>
                <div class="key" onclick="pressKey('6')">6</div>
                <div class="key" onclick="pressKey('7')">7</div>
                <div class="key" onclick="pressKey('8')">8</div>
                <div class="key" onclick="pressKey('9')">9</div>
                <div></div>
                <div class="key" onclick="pressKey('0')">0</div>
                <div class="key" onclick="clearLast()">&larr;</div>
            </div>
        </div>

        <!-- PAGE 2: COUNTER (ปรับแต่งตามรูปเรฟฟอนต์อ้วนกลมแยกชั้น) -->
        <div id="page2" class="page">
            <h1>Happy official 1st anniversary</h1>
            
            <div class="img-wrapper-p2">
                <img src="photo2.jpg" alt="Our Memory 2" onerror="this.style.display='none';">
            </div>

            <!-- การแสดงผลเวลาน่ารักๆ เรียงจากหน่วยใหญ่ลงไปเล็ก -->
            <div class="cute-counter-container">
                <div class="counter-row">
                    <span class="cute-num color-years" id="years">00</span>
                    <span class="cute-label label-years">years</span>
                </div>
                <div class="counter-row">
                    <span class="cute-num color-months" id="months">00</span>
                    <span class="cute-label label-months">months</span>
                </div>
                <div class="counter-row">
                    <span class="cute-num color-days" id="days">00</span>
                    <span class="cute-label label-days">days</span>
                </div>
                <div class="counter-row">
                    <span class="cute-num color-hours" id="hours">00</span>
                    <span class="cute-label label-hours">hours</span>
                </div>
                <div class="counter-row">
                    <span class="cute-num color-minutes" id="minutes">00</span>
                    <span class="cute-label label-minutes">minutes</span>
                </div>
                <div class="counter-row">
                    <span class="cute-num color-seconds" id="seconds">00</span>
                    <span class="cute-label label-seconds">seconds</span>
                </div>
            </div>

            <button class="next-btn" onclick="goToLetter()">Click to read my letter</button>
        </div>

        <!-- PAGE 3: LETTER -->
        <div id="page3" class="page">
            <div class="letter-paper">
                <span id="typing-text"></span><span class="cursor" id="cursor"></span>
            </div>
        </div>

    </div>

    <script>
        // --- CONFIGURATION ---
        const CORRECT_PASSCODE = "270725";
        const ANNIVERSARY_DATE = new Date("2025-07-27T00:00:00"); 

        // --- PASSCODE SYSTEM ---
        let currentInput = "";
        const dots = document.querySelectorAll('.dot');
        const page1 = document.getElementById('page1');

        function pressKey(num) {
            if (currentInput.length < 6) {
                currentInput += num;
                updateDots();
                
                if (currentInput.length === 6) {
                    setTimeout(checkPasscode, 200);
                }
            }
        }

        function clearLast() {
            if (currentInput.length > 0) {
                currentInput = currentInput.slice(0, -1);
                updateDots();
            }
        }

        function updateDots() {
            dots.forEach((dot, index) => {
                if (index < currentInput.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }

        function checkPasscode() {
            if (currentInput === CORRECT_PASSCODE) {
                navigateTo('page2');
                startTimer();
            } else {
                page1.classList.add('shake');
                if (navigator.vibrate) {
                    navigator.vibrate(200);
                }
                
                setTimeout(() => {
                    page1.classList.remove('shake');
                    currentInput = "";
                    updateDots();
                }, 400);
            }
        }

        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // --- REAL-TIME COUNTER ---
        function startTimer() {
            function updateCounter() {
                const now = new Date();
                
                let years = now.getFullYear() - ANNIVERSARY_DATE.getFullYear();
                let months = now.getMonth() - ANNIVERSARY_DATE.getMonth();
                let days = now.getDate() - ANNIVERSARY_DATE.getDate();
                
                if (days < 0) {
                    months--;
                    const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
                    days += prevMonth;
                }
                
                if (months < 0) {
                    years--;
                    months += 12;
                }

                const diffMs = now - ANNIVERSARY_DATE;
                const totalSeconds = Math.floor(diffMs / 1000);
                const hours = Math.floor((totalSeconds % (3600 * 24)) / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;

                // อัปเดตข้อมูลตัวเลขลงหน้าจอในหน่วยที่แยกออกจากกันแบบละเอียด
                document.getElementById('years').innerText = String(Math.max(0, years)).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                document.getElementById('months').innerText = String(Math.max(0, months)).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                document.getElementById('days').innerText = String(Math.max(0, days)).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                document.getElementById('hours').innerText = String(Math.max(0, hours)).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                document.getElementById('minutes').innerText = String(Math.max(0, minutes)).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                document.getElementById('seconds').innerText = String(Math.max(0, seconds)).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            }

            updateCounter();
            setInterval(updateCounter, 1000);
        }

        // --- TYPING LETTER SYSTEM ---
        const letterText = `Happy Official 1st Anniversary, my one and only, Jesse Lee. 

I still remember the first day we started talking and the first day we met. Every memory we've created together is so precious to me, and I treasure with all my heart.

I can't believe it's already been a year. Time has passed by so quickly, and soon we'll be celebrating your birthday together for the second time. Looking back, we've shared so many moments—happiness, laughter, tears, disagreements, and countless unforgettable memories. But no matter what we've been through, we've never let go of each other's hand.

To me, you are the most amazing boyfriend. You've been consistent, loyal, caring, and exactly the same wonderful person since the very beginning. You make me feel like the luckiest woman because I've never experienced a love like yours before. Thank you for loving me the way you do. And I hope you know that you deserve every bit of that love in return.

No matter what life brings us, I know we'll keep holding hands and overcome every obstacle together… even the really difficult ones—like your unbelievably loud burps and your deadly smelly farts that leave me with no choice but to surrender. 

Thank you for being my safe place, my best friend, and the love of my life.

I love you with all my heart, today, tomorrow, and always.

Happy 1st Anniversary, my love. Here's to forever.`;

        function goToLetter() {
            navigateTo('page3');
            typeWriter();
        }

        let index = 0;
        function typeWriter() {
            if (index < letterText.length) {
                document.getElementById("typing-text").textContent += letterText.charAt(index);
                index++;
                const container = document.querySelector('.phone-container');
                container.scrollTop = container.scrollHeight;
                setTimeout(typeWriter, 40); 
            } else {
                document.getElementById("cursor").style.display = "none";
            }
        }
    </script>
</body>
</html>
