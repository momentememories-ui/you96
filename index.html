<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Anniversary</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ... สไตล์เดิมที่ให้ไปก่อนหน้า ... */
        /* แก้ไขส่วนของ Modal ให้คงตำแหน่งไว้ตลอดเพื่อป้องกันการกระตุก */
        #gift-modal {
            display: none; /* เปลี่ยนเป็น none เฉพาะตอนปิดสนิท */
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease-in-out;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #gift-modal.active {
            display: flex;
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- ... โครงสร้าง HTML คงเดิม ... -->
    <div id="page5" class="page" style="background-color: #fff0f5; justify-content: center; padding: 40px 20px;">
        <div id="gift-grid" style="display: flex; flex-direction: column; gap: 25px; width: 100%; max-width: 300px; align-items: center;">
            <div class="gift-item" onclick="openGift('cakedu.png', '', 0)" style="cursor: pointer;"><img src="gift1.png" style="width: 120px;"></div>
            <div class="gift-item" onclick="openGift('flower.png', '', 1)" style="cursor: pointer;"><img src="gift2.png" style="width: 120px;"></div>
            <div class="gift-item" onclick="openGift('dinner', 'Dinner at Sancreed well cafe', 2)" style="cursor: pointer;"><img src="gift3.png" style="width: 120px;"></div>
        </div>
        <!-- ปุ่มจะยังไม่ขึ้นจนกว่าเงื่อนไขจะครบ -->
        <button id="memories-btn" class="next-btn" onclick="navigateTo('page6')" style="display: none; margin-top: 30px;">Click to see our memories</button>
        
        <div id="gift-modal">
            <img id="modal-img" src="" style="max-width: 80%;">
            <p id="modal-text" style="margin-top: 20px; font-size: 1.5rem; color: #ff758f; font-weight: bold;"></p>
            <button onclick="closeModal()" style="margin-top: 30px; padding: 10px 20px; border-radius: 20px; border: none; background: #ffccd5; color: #ff4d6d; cursor: pointer;">Close</button>
        </div>
    </div>
    <!-- ... (Page 6 เหมือนเดิม) ... -->

    <script>
        // ... (Script เดิม) ...
        function openGift(src, text, index) {
            const modal = document.getElementById('gift-modal');
            const img = document.getElementById('modal-img');
            const txt = document.getElementById('modal-text');
            
            openedGifts[index] = true;
            if(src === 'dinner') { img.style.display = 'none'; txt.innerText = text; } 
            else { img.src = src; img.style.display = 'block'; txt.innerText = text; }
            
            // ใช้ Class เพื่อคุมความนิ่ง
            modal.classList.add('active');
            
            // เช็คว่าเปิดครบ 3 กล่องหรือยังก่อนแสดงปุ่ม
            if (openedGifts.filter(v => v === true).length === 3) {
                document.getElementById('memories-btn').style.display = 'block';
            }
        }

        function closeModal() {
            const modal = document.getElementById('gift-modal');
            modal.style.opacity = '0';
            setTimeout(() => { 
                modal.classList.remove('active');
                modal.style.opacity = '1'; // คืนค่าเพื่อให้ transition ครั้งหน้าทำงาน
            }, 300);
        }
    </script>
</body>
</html>
