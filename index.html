<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Anniversary</title>
    <!-- นำเข้าฟอนต์อ้วนกลมน่ารัก -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* กำหนดให้ใช้ฟอนต์อ้วนกลม Fredoka ทั้งเว็บไซต์ ทุกองค์ประกอบ */
            font-family: 'Fredoka', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #fff0f5; 
            color: #ff4d6d; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Container for Mobile view */
        .phone-container {
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            position: relative;
            background: #ffffff; 
            box-shadow: 0 0 20px rgba(255, 77, 109, 0.1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .page {
            display: none;
            width: 100%;
            min-height: 100%;
            padding: 30px 24px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.5s ease-in-out;
        }

        .page.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        img {
            max-width: 100%;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.1);
            border: 3px solid #fff;
        }

        button.next-btn {
            background-color: #ff758f; 
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 4px 10px rgba(255, 117, 143, 0.3);
            transition: transform 0.2s;
        }

        button.next-btn:active {
            transform: scale(0.95);
        }

        /* PAGE 0: Welcome Gate using photo1.jpg */
        #page0 {
            background-image: url('photo1.jpg');
            background-size: cover;
            background-position: center top;
            position: relative;
            justify-content: flex-end; 
            padding: 60px 24px 60px 24px;
        }

        #page0::before, #page1::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 240, 245, 0.15);
            z-index: 1;
        }

        .welcome-action {
            position: relative;
            z-index: 2;
            width: 100%;
            text-align: center;
        }

        /* PAGE 1: Passcode Lock */
        #page1 {
            justify-content: space-between;
            padding: 60px 24px 20px 24px;
            background-image: url('photo1.jpg');
            background-size: cover;
            background-position: center top;
            position: relative;
        }

        .passcode-header, .keypad {
            position: relative;
            z-index: 2;
        }

        .passcode-header {
            text-align: center;
            width: 100%;
        }

        .passcode-header h2 {
            font-size: 1.6rem;
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(255, 77, 109, 0.6);
        }

        .dots-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 5px;
            background-color: #ffffff; 
            padding: 12px 25px;
            border-radius: 20px;
            display: inline-flex;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.15);
        }

        .dot {
            width: 12px;
            height: 12px;
            border: 2px solid #ffccd5;
            border-radius: 50%;
            transition: background 0.1s;
        }

        .dot.filled {
            background-color: #ff758f; 
            border-color: #ff758f;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 270px;
            margin-top: auto; 
            margin-bottom: 15px;
        }

        .key {
            aspect-ratio: 1/1;
            border-radius: 50%;
            background-color: #ffffff; 
            font-size: 1.5rem;
            color: #ff4d6d; 
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 4px 8px rgba(255, 77, 109, 0.15);
            transition: background 0.1s, transform 0.1s;
            border: 1px solid #ffccd5;
        }

        .key:active {
            background-color: #fff0f5;
            transform: scale(0.95);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }

        /* PAGE 2: Counter */
        #page2 {
            justify-content: center;
            background-color: #ffffff;
            padding-top: 20px;
            padding-bottom: 30px;
        }

        #page2 h1 {
            font-size: 1.4rem;
            color: #ff758f;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .img-wrapper-p2 {
            width: 85%;
            max-height: 220px;
            margin-bottom: 35px;
            display: flex;
            justify-content: center;
        }

        .img-wrapper-p2 img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
        }

        /* กล่องครอบเวลานอนบรรทัดเดียว */
        .horizontal-counter {
            font-weight: 700;
            font-size: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 100%;
            color: #ff758f;
            text-shadow: 1px 1px 0px #fff, -1px -1px 0px #fff, 1px -1px 0px #fff, -1px 1px 0px #fff, 0px 4px 8px rgba(0,0,0,0.06);
            margin-bottom: 15px;
        }

        .time-unit {
            display: inline-block;
        }
        
        /* สีกระจายแบบพาสเทล */
        #days-box { color: #ff85a2; }
        #hours-box { color: #fbc4ab; }
        #minutes-box { color: #b7e4c7; }
        #seconds-box { color: #a8dadc; }
        .colon { color: #ffccd5; font-size: 2.2rem; padding: 0 2px; }

        /* ป้ายกำกับเล็กๆ ด้านล่างตัวเลข */
        .labels-row {
            display: flex;
            justify-content: center;
            gap: 32px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #ffa6c9;
            margin-bottom: 30px;
        }

        /* PAGE 3: Letter - ปรับปรุงพื้นหลังเป็น photo3.png และจัดข้อความกึ่งกลาง */
        #page3 {
            justify-content: flex-start;
            padding: 50px 24px;
            background-image: url('photo3.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* ข้อความลอยเด่น ไม่มีกรอบขาว และจัดกึ่งกลาง */
        .letter-content {
            width: 100%;
            line-height: 1.7;
            font-size: 1.05rem;
            color: #4a4a4a;
            white-space: pre-line;
            text-align: center; /* จัดตัวอักษรให้อยู่กึ่งกลาง */
            font-weight: 500;
            text-shadow: 0px 1px 2px rgba(255, 255, 255, 0.8); /* เพิ่มมิติให้อ่านง่ายขึ้นบนพื้นหลัง */
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 16px;
            background-color: #ff4d6d;
            animation: blink 0.7s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="phone-container">

        <!-- PAGE 0: WELCOME GATE -->
        <div id="page0" class="page active">
            <div class="welcome-action">
                <button class="next-btn" onclick="navigateTo('page1')">Let's start the journey ❤️</button>
            </div>
        </div>

        <!-- PAGE 1: PASSCODE -->
        <div id="page1" class="page">
            <div class="passcode-header">
                <h2>Enter the Passcode</h2>
                <div class="dots-container" id="dotsContainer">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>

            <div class="keypad">
                <div class="key" onclick="pressKey('1')">1</div>
                <div class="key" onclick="pressKey('2')">2</div>
                <div class="key" onclick="pressKey('3')">3</div>
                <div class="key" onclick="pressKey('4')">4</div>
                <div class="key" onclick="pressKey('5')">5</div>
                <div class="key" onclick="pressKey('6')">6</div>
                <div class="key" onclick="pressKey('7')">7</div>
                <div class="key" onclick="pressKey('8')">8</div>
                <div class="key" onclick="pressKey('9')">9</div>
                <div></div>
                <div class="key" onclick="pressKey('0')">0</div>
                <div class="key" onclick="clearLast()">&larr;</div>
            </div>
        </div>

        <!-- PAGE 2: COUNTER -->
        <div id="page2" class="page">
            <h1 id="counter-title">Countdown to our 1st Anniversary</h1>
            
            <div class="img-wrapper-p2">
                <img src="photo2.jpg" alt="Our Memory 2" onerror="this.style.display='none';">
            </div>

            <!-- แสดงตัวเลขแนวนอนบรรทัดเดียว คั่นด้วย : -->
            <div class="horizontal-counter">
                <span class="time-unit" id="days-box">00</span>
                <span class="colon">:</span>
                <span class="time-unit" id="hours-box">00</span>
                <span class="colon">:</span>
                <span class="time-unit" id="minutes-box">00</span>
                <span class="colon">:</span>
                <span class="time-unit" id="seconds-box">00</span>
            </div>

            <!-- คำอธิบายหน่วยเวลาด้านล่างตัวเลข -->
            <div class="labels-row">
                <span>days</span>
                <span>hours</span>
                <span>mins</span>
                <span>secs</span>
            </div>

            <button class="next-btn" onclick="goToLetter()">Click to read my letter</button>
        </div>

        <!-- PAGE 3: LETTER (ปรับปรุงตามเงื่อนไขใหม่) -->
        <div id="page3" class="page">
            <div class="letter-content">
                <span id="typing-text"></span><span class="cursor" id="cursor"></span>
            </div>
        </div>

    </div>

    <script>
        // --- CONFIGURATION ---
        const CORRECT_PASSCODE = "270725";
        // ตั้งเป้าหมายนับถอยหลังไปสู่วันที่ 27 กรกฎาคม 2569 (2026)
        const TARGET_DATE = new Date("2026-07-27T00:00:00").getTime(); 

        // --- PASSCODE SYSTEM ---
        let currentInput = "";
        const dots = document.querySelectorAll('.dot');
        const page1 = document.getElementById('page1');

        function pressKey(num) {
            if (currentInput.length < 6) {
                currentInput += num;
                updateDots();
                
                if (currentInput.length === 6) {
                    setTimeout(checkPasscode, 200);
                }
            }
        }

        function clearLast() {
            if (currentInput.length > 0) {
                currentInput = currentInput.slice(0, -1);
                updateDots();
            }
        }

        function updateDots() {
            dots.forEach((dot, index) => {
                if (index < currentInput.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }

        function checkPasscode() {
            if (currentInput === CORRECT_PASSCODE) {
                navigateTo('page2');
                startCountdown();
            } else {
                page1.classList.add('shake');
                if (navigator.vibrate) {
                    navigator.vibrate(200);
                }
                
                setTimeout(() => {
                    page1.classList.remove('shake');
                    currentInput = "";
                    updateDots();
                }, 400);
            }
        }

        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // --- COUNTDOWN SYSTEM ---
        function startCountdown() {
            const titleElement = document.getElementById('counter-title');

            function updateTimer() {
                const now = new Date().getTime();
                const difference = TARGET_DATE - now;

                // เมื่อการนับถอยหลังสิ้นสุดลงหรือเลยกำหนดแล้ว
                if (difference <= 0) {
                    document.getElementById('days-box').innerText = "00";
                    document.getElementById('hours-box').innerText = "00";
                    document.getElementById('minutes-box').innerText = "00";
                    document.getElementById('seconds-box').innerText = "00";
                    
                    // เปลี่ยนหัวเรื่องเป็นข้อความฉลองวันครบรอบ
                    titleElement.innerText = "Happy Anniversary 1 Year";
                    return;
                }

                // เมื่อยังอยู่ในช่วงนับถอยหลัง
                titleElement.innerText = "Countdown to our 1st Anniversary";

                // คำนวณหา วัน ชั่วโมง นาที วินาที จากเวลาที่เหลือทั้งหมด
                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                // แสดงผลแบบใส่ 0 ข้างหน้าถ้าหลักเดียว
                document.getElementById('days-box').innerText = String(days).padStart(2, '0');
                document.getElementById('hours-box').innerText = String(hours).padStart(2, '0');
                document.getElementById('minutes-box').innerText = String(minutes).padStart(2, '0');
                document.getElementById('seconds-box').innerText = String(seconds).padStart(2, '0');
            }

            updateTimer();
            setInterval(updateTimer, 1000);
        }

        // --- TYPING LETTER SYSTEM ---
        const letterText = `Happy Official 1st Anniversary, my one and only, Jesse Lee. 

I still remember the first day we started talking and the first day we met. Every memory we've created together is so precious to me, and I treasure with all my heart.

I can't believe it's already been a year. Time has passed by so quickly, and soon we'll be celebrating your birthday together for the second time. Looking back, we've shared so many moments—happiness, laughter, tears, disagreements, and countless unforgettable memories. But no matter what we've been through, we've never let go of each other's hand.

To me, you are the most amazing boyfriend. You've been consistent, loyal, caring, and exactly the same wonderful person since the very beginning. You make me feel like the luckiest woman because I've never experienced a love like yours before. Thank you for loving me the way you do. And I hope you know that you deserve every bit of that love in return.

No matter what life brings us, I know we'll keep holding hands and overcome every obstacle together… even the really difficult ones—like your unbelievably loud burps and your deadly smelly farts that leave me with no choice but to surrender. 

Thank you for being my safe place, my best friend, and the love of my life.

I love you with all my heart, today, tomorrow, and always.

Happy 1st Anniversary, my love. Here's to forever.`;

        function goToLetter() {
            navigateTo('page3');
            typeWriter();
        }

        let index = 0;
        function typeWriter() {
            if (index < letterText.length) {
                document.getElementById("typing-text").textContent += letterText.charAt(index);
                index++;
                const container = document.querySelector('.phone-container');
                container.scrollTop = container.scrollHeight;
                setTimeout(typeWriter, 40); 
            } else {
                document.getElementById("cursor").style.display = "none";
            }
        }
    </script>
</body>
</html>
